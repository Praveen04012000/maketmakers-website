<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Makers Design Studio | Creative Design & Print Solutions</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5276;
            --primary-light: #2980b9;
            --accent: #e74c3c;
            --accent-orange: #f39c12;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --gray: #6c757d;
            --green: #27ae60;
            --gradient-1: linear-gradient(135deg, #1a5276 0%, #2980b9 50%, #3498db 100%);
            --gradient-2: linear-gradient(135deg, #e74c3c 0%, #f39c12 100%);
            --gradient-3: linear-gradient(135deg, #1a1a2e 0%, #1a5276 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Poppins', sans-serif;
            color: #333;
            overflow-x: hidden;
            background: #fff;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 15px 0;
            transition: all 0.4s ease;
            background: transparent;
        }

        .navbar.scrolled {
            background: rgba(255, 255, 255, 0.97);
            box-shadow: 0 2px 30px rgba(0,0,0,0.1);
            padding: 8px 0;
        }

        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--gradient-2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            font-weight: 800;
            position: relative;
            overflow: hidden;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
            animation: logoShine 3s infinite;
        }

        @keyframes logoShine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-text .brand {
            font-size: 22px;
            font-weight: 800;
            color: var(--dark);
            line-height: 1.1;
        }

        .navbar:not(.scrolled) .logo-text .brand { color: #fff; }

        .logo-text .tagline {
            font-size: 11px;
            color: var(--gray);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .navbar:not(.scrolled) .logo-text .tagline { color: rgba(255,255,255,0.7); }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 5px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .navbar.scrolled .nav-links a { color: var(--dark); }

        .nav-links a:hover {
            background: rgba(41, 128, 185, 0.1);
            color: var(--primary-light);
        }

        .nav-links .cta-btn {
            background: var(--gradient-2);
            color: #fff !important;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
        }

        .nav-links .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 1001;
        }

        .hamburger span {
            width: 28px;
            height: 3px;
            background: #fff;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .navbar.scrolled .hamburger span { background: var(--dark); }

        /* ===== HERO SECTION ===== */
        .hero {
            min-height: 100vh;
            background: var(--gradient-3);
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(41,128,185,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(231,76,60,0.15) 0%, transparent 40%),
                radial-gradient(circle at 60% 80%, rgba(243,156,18,0.1) 0%, transparent 40%);
        }

        .hero-particles {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        .hero .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            color: #fff;
            line-height: 1.15;
            margin-bottom: 20px;
        }

        .hero-content h1 span {
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-content p {
            font-size: 18px;
            color: rgba(255,255,255,0.75);
            line-height: 1.7;
            margin-bottom: 35px;
            max-width: 500px;
        }

        .hero-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--gradient-2);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(231,76,60,0.4);
        }

        .btn-outline {
            border: 2px solid rgba(255,255,255,0.4);
            color: #fff;
            background: transparent;
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.1);
            border-color: #fff;
            transform: translateY(-3px);
        }

        .hero-visual {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-graphic {
            position: relative;
            width: 450px;
            height: 450px;
        }

        .hero-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.08);
            animation: spin 20s linear infinite;
        }

        .hero-ring:nth-child(1) { width: 100%; height: 100%; top: 0; left: 0; }
        .hero-ring:nth-child(2) { width: 75%; height: 75%; top: 12.5%; left: 12.5%; animation-direction: reverse; animation-duration: 15s; border-color: rgba(41,128,185,0.2); }
        .hero-ring:nth-child(3) { width: 50%; height: 50%; top: 25%; left: 25%; animation-duration: 10s; border-color: rgba(231,76,60,0.15); }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .hero-center-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            width: 240px;
        }

        .hero-center-card .year {
            font-size: 52px;
            font-weight: 800;
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .hero-center-card .since {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 5px;
        }

        .hero-center-card .exp {
            color: #fff;
            font-size: 15px;
            margin-top: 10px;
            font-weight: 500;
        }

        .floating-badge {
            position: absolute;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            animation: floatBadge 4s ease-in-out infinite;
        }

        .floating-badge i { font-size: 20px; color: var(--accent-orange); }

        .floating-badge:nth-child(5) { top: 5%; right: 0; animation-delay: 0s; }
        .floating-badge:nth-child(6) { bottom: 10%; left: -10%; animation-delay: 2s; }
        .floating-badge:nth-child(7) { top: 30%; left: -15%; animation-delay: 1s; }

        @keyframes floatBadge {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            background: #fff;
            padding: 0;
            position: relative;
            z-index: 10;
            margin-top: -50px;
        }

        .stats-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .stat-item {
            padding: 35px 20px;
            text-align: center;
            border-right: 1px solid #eee;
            transition: all 0.3s;
        }

        .stat-item:last-child { border-right: none; }

        .stat-item:hover {
            background: var(--gradient-1);
            color: #fff;
        }

        .stat-item:hover .stat-number,
        .stat-item:hover .stat-label { color: #fff; }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            transition: color 0.3s;
        }

        .stat-label {
            font-size: 13px;
            color: var(--gray);
            margin-top: 5px;
            font-weight: 500;
            transition: color 0.3s;
        }

        /* ===== SECTION STYLES ===== */
        .section {
            padding: 100px 0;
        }

        .section-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-badge {
            display: inline-block;
            padding: 6px 18px;
            background: rgba(41, 128, 185, 0.1);
            color: var(--primary-light);
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            color: var(--dark);
            margin-bottom: 15px;
        }

        .section-subtitle {
            font-size: 17px;
            color: var(--gray);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* ===== ABOUT ===== */
        .about { background: #fff; }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .about-content p {
            font-size: 16px;
            color: #555;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .about-features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .about-feature {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--light);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--dark);
        }

        .about-feature i {
            color: var(--green);
            font-size: 16px;
        }

        .about-visual {
            position: relative;
        }

        .mission-vision-cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .mv-card {
            padding: 30px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .mv-card.mission {
            background: linear-gradient(135deg, #1a5276, #2980b9);
            color: #fff;
        }

        .mv-card.vision {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff;
        }

        .mv-card h3 {
            font-size: 22px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mv-card h3 i { font-size: 24px; }

        .mv-card p {
            font-size: 15px;
            line-height: 1.7;
            opacity: 0.9;
        }

        .mv-card::after {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }

        /* ===== SERVICES ===== */
        .services {
            background: var(--light);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .service-card {
            background: #fff;
            border-radius: 20px;
            padding: 35px 30px;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
            border: 1px solid #eee;
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border-color: transparent;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-1);
            transform: scaleX(0);
            transition: transform 0.4s;
        }

        .service-card:hover::before { transform: scaleX(1); }

        .service-icon {
            width: 65px;
            height: 65px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .service-card:nth-child(1) .service-icon { background: rgba(41,128,185,0.1); color: var(--primary-light); }
        .service-card:nth-child(2) .service-icon { background: rgba(231,76,60,0.1); color: var(--accent); }
        .service-card:nth-child(3) .service-icon { background: rgba(243,156,18,0.1); color: var(--accent-orange); }
        .service-card:nth-child(4) .service-icon { background: rgba(39,174,96,0.1); color: var(--green); }
        .service-card:nth-child(5) .service-icon { background: rgba(142,68,173,0.1); color: #8e44ad; }
        .service-card:nth-child(6) .service-icon { background: rgba(41,128,185,0.1); color: var(--primary-light); }
        .service-card:nth-child(7) .service-icon { background: rgba(231,76,60,0.1); color: var(--accent); }
        .service-card:nth-child(8) .service-icon { background: rgba(243,156,18,0.1); color: var(--accent-orange); }
        .service-card:nth-child(9) .service-icon { background: rgba(39,174,96,0.1); color: var(--green); }

        .service-card h3 {
            font-size: 19px;
            color: var(--dark);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .service-card p {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.7;
        }

        .service-card .service-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 15px;
        }

        .service-tag {
            padding: 4px 12px;
            background: var(--light);
            border-radius: 50px;
            font-size: 12px;
            color: var(--gray);
            font-weight: 500;
        }

        /* ===== PORTFOLIO SHOWCASE ===== */
        .portfolio {
            background: var(--dark);
            color: #fff;
            overflow: hidden;
        }

        .portfolio .section-badge { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
        .portfolio .section-title { color: #fff; }
        .portfolio .section-subtitle { color: rgba(255,255,255,0.6); }

        .portfolio-categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .portfolio-cat {
            padding: 10px 24px;
            border-radius: 50px;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .portfolio-cat:hover, .portfolio-cat.active {
            background: var(--primary-light);
            color: #fff;
            border-color: var(--primary-light);
        }

        .portfolio-marquee {
            display: flex;
            gap: 20px;
            animation: marquee 30s linear infinite;
            width: max-content;
        }

        .portfolio-marquee:hover { animation-play-state: paused; }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .portfolio-item {
            flex-shrink: 0;
            width: 320px;
            height: 220px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, rgba(41,128,185,0.3), rgba(231,76,60,0.2));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .portfolio-item .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.8) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .portfolio-item:hover .overlay { opacity: 1; }

        .portfolio-item .p-label {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .portfolio-item .p-cat {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .portfolio-item i {
            font-size: 40px;
            color: rgba(255,255,255,0.5);
        }

        /* ===== CLIENTS ===== */
        .clients {
            background: #fff;
        }

        .clients-info {
            text-align: center;
            margin-bottom: 40px;
        }

        .clients-info p {
            font-size: 16px;
            color: var(--gray);
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.7;
        }

        .clients-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .client-card {
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #eee;
            text-align: center;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .client-card:hover {
            border-color: var(--primary-light);
            box-shadow: 0 10px 30px rgba(41,128,185,0.1);
            transform: translateY(-5px);
        }

        .client-card i {
            font-size: 32px;
            color: var(--primary-light);
        }

        .client-card span {
            font-size: 14px;
            font-weight: 500;
            color: var(--dark);
        }

        /* ===== WHY CHOOSE US ===== */
        .why-us {
            background: var(--light);
        }

        .why-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .why-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            transition: all 0.4s;
            border: 1px solid #eee;
        }

        .why-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
        }

        .why-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            color: #fff;
        }

        .why-card h3 {
            font-size: 18px;
            color: var(--dark);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .why-card p {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.7;
        }

        /* ===== CTA SECTION ===== */
        .cta-section {
            background: var(--gradient-1);
            padding: 80px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .cta-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.1) 0%, transparent 60%);
        }

        .cta-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            color: #fff;
            margin-bottom: 15px;
            position: relative;
        }

        .cta-section p {
            color: rgba(255,255,255,0.8);
            font-size: 17px;
            margin-bottom: 30px;
            position: relative;
        }

        .cta-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            position: relative;
            flex-wrap: wrap;
        }

        .btn-white {
            background: #fff;
            color: var(--primary);
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-white:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* ===== CONTACT ===== */
        .contact {
            background: #fff;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
        }

        .contact-info-cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-card {
            display: flex;
            gap: 18px;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #eee;
            transition: all 0.3s;
        }

        .contact-card:hover {
            border-color: var(--primary-light);
            box-shadow: 0 10px 30px rgba(41,128,185,0.1);
        }

        .contact-card-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: rgba(41,128,185,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--primary-light);
            flex-shrink: 0;
        }

        .contact-card h4 {
            font-size: 16px;
            color: var(--dark);
            margin-bottom: 4px;
        }

        .contact-card p, .contact-card a {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.6;
            text-decoration: none;
        }

        .contact-card a:hover { color: var(--primary-light); }

        .contact-form {
            background: var(--light);
            border-radius: 20px;
            padding: 40px;
        }

        .contact-form h3 {
            font-size: 22px;
            color: var(--dark);
            margin-bottom: 25px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--dark);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
            background: #fff;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-light);
        }

        .form-group textarea { resize: vertical; min-height: 100px; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--gradient-1);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(41,128,185,0.3);
        }

        /* ===== FOOTER ===== */
        .footer {
            background: var(--dark);
            color: rgba(255,255,255,0.7);
            padding: 60px 0 20px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1.5fr;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .footer-brand .brand-name {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 5px;
        }

        .footer-brand .brand-tag {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 15px;
        }

        .footer-brand p {
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .social-links {
            display: flex;
            gap: 10px;
        }

        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            transition: all 0.3s;
            text-decoration: none;
        }

        .social-link:hover {
            background: var(--primary-light);
            color: #fff;
            transform: translateY(-3px);
        }

        .footer-col h4 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .footer-col ul {
            list-style: none;
        }

        .footer-col ul li {
            margin-bottom: 10px;
        }

        .footer-col ul li a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .footer-col ul li a:hover {
            color: #fff;
            padding-left: 5px;
        }

        .footer-bottom {
            border-top: 1px solid rgba(255,255,255,0.06);
            margin-top: 40px;
            padding-top: 20px;
            text-align: center;
            font-size: 13px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding-left: 20px;
            padding-right: 20px;
        }

        /* ===== SCROLL TO TOP ===== */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 999;
            border: none;
            box-shadow: 0 5px 20px rgba(41,128,185,0.4);
        }

        .scroll-top.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .scroll-top:hover { transform: translateY(-3px); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .hero .container { grid-template-columns: 1fr; text-align: center; }
            .hero-content h1 { font-size: 42px; }
            .hero-content p { margin: 0 auto 35px; }
            .hero-buttons { justify-content: center; }
            .hero-visual { display: none; }
            .about-grid { grid-template-columns: 1fr; }
            .services-grid { grid-template-columns: repeat(2, 1fr); }
            .contact-grid { grid-template-columns: 1fr; }
            .footer-grid { grid-template-columns: 1fr 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 280px;
                height: 100vh;
                background: #fff;
                flex-direction: column;
                padding: 80px 30px 30px;
                box-shadow: -10px 0 40px rgba(0,0,0,0.1);
                transition: right 0.3s;
                gap: 5px;
            }
            .nav-links.active { right: 0; }
            .nav-links a { color: var(--dark) !important; width: 100%; }
            .hero-content h1 { font-size: 34px; }
            .section-title { font-size: 32px; }
            .services-grid { grid-template-columns: 1fr; }
            .why-grid { grid-template-columns: 1fr; }
            .clients-grid { grid-template-columns: repeat(2, 1fr); }
            .footer-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .about-features { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            .hero-content h1 { font-size: 28px; }
            .stats-grid { grid-template-columns: 1fr; }
            .portfolio-item { width: 260px; height: 180px; }
        }
    </style>
</head>
